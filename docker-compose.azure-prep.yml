# Local production-style smoke test (web + scheduler in one container + Postgres).
# Usage:
#   docker compose -f docker-compose.azure-prep.yml up --build -d
#   docker compose -f docker-compose.azure-prep.yml run --rm web npx prisma migrate deploy
#   curl -sf http://localhost:3000/api/health

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsagent
      POSTGRES_PASSWORD: newsagent
      POSTGRES_DB: newsagent
    ports:
      - "5433:5432"
    volumes:
      - newsagent_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsagent -d newsagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://newsagent:newsagent@postgres:5432/newsagent?schema=public
      APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  newsagent_pg:
